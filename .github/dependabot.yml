version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 1
    groups:
      python-routine-patches:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["patch"]
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      - dependency-name: httpx2
        update-types:
          - version-update:semver-patch
      - dependency-name: mcp
        update-types:
          - version-update:semver-patch
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 1
    groups:
      frontend-routine-patches:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["patch"]
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      - dependency-name: "@playwright/test"
        update-types:
          - version-update:semver-patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      actions-routine-patches:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["patch"]
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

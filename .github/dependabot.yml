version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python-bootstrap:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      frontend-bootstrap:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      docker-bootstrap:
        patterns: ["*"]
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    groups:
      compose-bootstrap:
        patterns: ["*"]
